name = "search-gateway"
main = "src/index.js"
compatibility_date = "2026-07-01"
workers_dev = true

# Secrets to set before deploy:
#   npx wrangler secret put SEARCH_GATEWAY_TOKEN
# Optional provider secrets/vars:
#   npx wrangler secret put SEARXNG_URL
#   npx wrangler secret put BRAVE_SEARCH_API_KEY
#   npx wrangler secret put SERPER_API_KEY
#   npx wrangler secret put TAVILY_API_KEY
#
# Optional strict(er) rate-limit setup:
#   npx wrangler kv namespace create SEARCH_RATE_LIMIT_KV
#   Add the returned binding below as [[kv_namespaces]] with binding = "SEARCH_RATE_LIMIT_KV".
#   Set SEARCH_RATE_LIMIT_PER_MINUTE as a var or secret.
#
# Do NOT commit real tokens in this file.

[observability]
enabled = true
