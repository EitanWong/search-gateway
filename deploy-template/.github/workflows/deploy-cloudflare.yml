name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'wrangler.toml'
      - '.github/workflows/deploy-cloudflare.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate and deploy Worker
    if: >-
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
      (github.event_name == 'workflow_dispatch' || vars.CLOUDFLARE_AUTO_DEPLOY == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check deployment configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo 'Missing repository variable CLOUDFLARE_ACCOUNT_ID.' >&2; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo 'Missing repository secret CLOUDFLARE_API_TOKEN.' >&2; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify before deploy
        run: npm run build && npm run dry-run

      - name: Deploy
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_OUTPUT="$(npm run deploy 2>&1 | tee /dev/stderr)"
          WORKER_URL="$(printf '%s\n' "$DEPLOY_OUTPUT" | grep -Eo 'https://[^[:space:]]+\.workers\.dev' | tail -n 1)"
          test -n "$WORKER_URL" || { echo 'Could not find a Workers.dev URL in Wrangler deploy output.' >&2; exit 1; }
          echo "worker_url=$WORKER_URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke test deployed Worker
        env:
          WORKER_URL: ${{ steps.deploy.outputs.worker_url }}
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --retry 5 --retry-all-errors --connect-timeout 10 "$WORKER_URL/health" \
            | node -e 'let body = ""; process.stdin.on("data", (chunk) => body += chunk).on("end", () => { const health = JSON.parse(body); if (!health.ok || health.service !== "search-gateway") process.exit(1); console.log(`Healthy: ${health.service} ${health.version}`); });'