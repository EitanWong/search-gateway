name: Update from upstream

on:
  workflow_dispatch:
    inputs:
      upstream_repository:
        description: Upstream owner/repo to sync from
        required: true
        default: EitanWong/search-gateway
      upstream_ref:
        description: Upstream branch, tag, or commit
        required: true
        default: main
      preserve_wrangler:
        description: Preserve this repo's wrangler.toml
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    # Weekly safety net. Opens a PR only when upstream deploy-template changed.
    - cron: '0 9 * * 1'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-from-upstream-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Open upstream update PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      - name: Resolve update inputs
        run: |
          set -euo pipefail
          echo "UPSTREAM_REPOSITORY=${UPSTREAM_REPOSITORY:-EitanWong/search-gateway}" >> "$GITHUB_ENV"
          echo "UPSTREAM_REF=${UPSTREAM_REF:-main}" >> "$GITHUB_ENV"
          echo "PRESERVE_WRANGLER=${PRESERVE_WRANGLER:-true}" >> "$GITHUB_ENV"
        env:
          UPSTREAM_REPOSITORY: ${{ github.event.inputs.upstream_repository }}
          UPSTREAM_REF: ${{ github.event.inputs.upstream_ref }}
          PRESERVE_WRANGLER: ${{ github.event.inputs.preserve_wrangler }}

      - name: Download upstream deploy template
        run: |
          set -euo pipefail
          rm -rf /tmp/search-gateway-archive /tmp/search-gateway-upstream
          mkdir -p /tmp/search-gateway-archive /tmp/search-gateway-upstream
          curl -fsSL "https://github.com/${UPSTREAM_REPOSITORY}/archive/${UPSTREAM_REF}.tar.gz" -o /tmp/upstream.tar.gz
          tar -xzf /tmp/upstream.tar.gz -C /tmp/search-gateway-archive
          TEMPLATE_DIR=$(find /tmp/search-gateway-archive -type d -path '*/deploy-template' | head -n 1)
          if [ -z "$TEMPLATE_DIR" ]; then
            echo "Could not find deploy-template in ${UPSTREAM_REPOSITORY}@${UPSTREAM_REF}." >&2
            exit 1
          fi
          rsync -a "$TEMPLATE_DIR/" /tmp/search-gateway-upstream/

      - name: Sync template files
        run: |
          set -euo pipefail
          rm -rf \
            /tmp/search-gateway-upstream/node_modules \
            /tmp/search-gateway-upstream/dist \
            /tmp/search-gateway-upstream/.wrangler \
            /tmp/search-gateway-upstream/.dev.vars \
            /tmp/search-gateway-upstream/.env
          if [ "$PRESERVE_WRANGLER" = "true" ]; then
            rm -f /tmp/search-gateway-upstream/wrangler.toml
          fi
          cp -a /tmp/search-gateway-upstream/. ./

      - name: Check for changes
        id: changes
        run: |
          set -euo pipefail
          git status --short
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Validate updated template
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          npm ci
          npm run build
          npm run dry-run

      - name: Create update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="update/search-gateway-${UPSTREAM_REF//[^A-Za-z0-9._-]/-}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "chore: update search-gateway from upstream ${UPSTREAM_REF}"
          git push --force-with-lease origin "$BRANCH"
          gh pr create \
            --title "chore: update search-gateway from upstream ${UPSTREAM_REF}" \
            --body "Syncs deployment template files from ${UPSTREAM_REPOSITORY}@${UPSTREAM_REF}.\n\nValidation run before opening this PR:\n- npm ci\n- npm run build\n- npm run dry-run\n\nReview notes:\n- By default this workflow preserves local wrangler.toml so Worker name, routes, vars, and bindings stay under your control.\n- Check upstream release notes for any required configuration changes before merging.\n- After merge, Cloudflare's Git integration should deploy the updated Worker." \
            --base "${GITHUB_REF_NAME}" \
            --head "$BRANCH" \
            || gh pr edit "$BRANCH" \
              --title "chore: update search-gateway from upstream ${UPSTREAM_REF}" \
              --body "Syncs deployment template files from ${UPSTREAM_REPOSITORY}@${UPSTREAM_REF}.\n\nValidation run before opening this PR:\n- npm ci\n- npm run build\n- npm run dry-run\n\nReview notes:\n- By default this workflow preserves local wrangler.toml so Worker name, routes, vars, and bindings stay under your control.\n- Check upstream release notes for any required configuration changes before merging.\n- After merge, Cloudflare's Git integration should deploy the updated Worker."
